<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <header class="header"><h1>My Website</h1></header>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <span class="navbar-brand">Website</span>
            <div class="navbar-nav">
                <a class="nav-link" href="#">Home</a>
                <a class="nav-link" href="#">About</a>
                <a class="nav-link" href="#">Services</a>
                <a class="nav-link" href="#">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container-fluid content-area">
        <div class="row">
            <div class="col-12 col-md-6">
                <h2>Column 1</h2>
                <p>This is the first column. On small devices it is full width, on medium it is half.</p>
            </div>
            <div class="col-12 col-md-6 border-start-custom">
                <h2>Column 2</h2>
                <p>This is the second column. It also adjusts using Bootstrap grid.</p>
            </div>
        </div>
    </main>

    <footer class="footer">Copyright © 2026 My Website</footer>

</body>
</html>
